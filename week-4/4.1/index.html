<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3.js House and Garden SVG</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #canvas-container {
            display: flex;
            border: 2px solid #ccc;
            background-color: white;
        }

        .row{
            width: 100%;
            height: fit-content;

            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 10px;
        }

        .container{
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="row" style="margin-bottom: 50px;">
        <div id="canvas-container"></div>
    </div>


    <div class="row">
        <div class="">
            <img src="../4.1/img/Screenshot 2026-04-10 162005.png" alt="">
        </div>
        <div class="">
            <img src="../4.1/img/Screenshot 2026-04-10 220034.png" alt="">
        </div>
    </div>

    <div class="row">
        <div class="">
            <img src="img/Screenshot 2026-04-10 220203.png" alt="" srcset="">
        </div>
        <div class="">
            <img src="img/Screenshot 2026-04-10 220254.png" alt="" srcset="">
        </div>
    </div>
</div>



<script>
    // 1. Set up the SVG container
    const width = 400;
    const height = 400;

    const svg = d3.select("#canvas-container")
        .append("svg")
        .attr("width", width)
        .attr("height", height);

    // 2. Sky (Rectangle)
    svg.append("rect")
        .attr("width", width)
        .attr("height", height)
        .attr("fill", "#87CEEB"); // Light Blue

    // 3. Grass (Rectangle)
    svg.append("rect")
        .attr("y", 240)
        .attr("width", width)
        .attr("height", 160)
        .attr("fill", "#008000"); // Green

    // 4. Sun (Circle)
    svg.append("circle")
        .attr("cx", 320)
        .attr("cy", 80)
        .attr("r", 35)
        .attr("fill", "yellow");

    // 5. Tree Trunk (Rectangle)
    svg.append("rect")
        .attr("x", 65)
        .attr("y", 180)
        .attr("width", 15)
        .attr("height", 80)
        .attr("fill", "#A0522D"); // Sienna Brown

    // 6. Tree Leaves (Path - utilizing Bezier curves)
    svg.append("path")
        .attr("d", "M 72.5 200 C 30 200 30 140 55 140 C 65 140 72.5 155 72.5 155 C 72.5 155 80 140 90 140 C 115 140 115 200 72.5 200 Z")
        .attr("fill", "forestgreen");

    // 7. House Body (Rectangle)
    svg.append("rect")
        .attr("x", 120)
        .attr("y", 160)
        .attr("width", 160)
        .attr("height", 120)
        .attr("fill", "#8B4513"); // Saddle Brown

    // 8. House Roof (Polygon)
    svg.append("polygon")
        .attr("points", "120,160 200,80 280,160")
        .attr("fill", "#CD853F"); // Peru Brown

    // 9. Left Window (Rectangle)
    svg.append("rect")
        .attr("x", 135)
        .attr("y", 175)
        .attr("width", 30)
        .attr("height", 30)
        .attr("fill", "#ADD8E6"); // Light Blue

    // 10. Right Window (Rectangle)
    svg.append("rect")
        .attr("x", 235)
        .attr("y", 175)
        .attr("width", 30)
        .attr("height", 30)
        .attr("fill", "#ADD8E6"); // Light Blue

    // 11. Door (Rectangle)
    svg.append("rect")
        .attr("x", 185)
        .attr("y", 220)
        .attr("width", 30)
        .attr("height", 60)
        .attr("fill", "#A0522D"); // Sienna Brown

    // 12. Doorknob (Circle)
    svg.append("circle")
        .attr("cx", 210)
        .attr("cy", 255)
        .attr("r", 3)
        .attr("fill", "black");

    // 13. Winding Path Lines (Path with Q/Quadratic curves)
    // Left curve of the path
    svg.append("path")
        .attr("d", "M 185 280 Q 100 340 190 400")
        .attr("stroke", "orange")
        .attr("stroke-width", 3)
        .attr("fill", "none");

    // Right curve of the path
    svg.append("path")
        .attr("d", "M 215 280 Q 130 340 230 400")
        .attr("stroke", "orange")
        .attr("stroke-width", 3)
        .attr("fill", "none");

    // 14. Text Label
    svg.append("text")
        .attr("x", 305)
        .attr("y", 235)
        .attr("font-family", "Arial, sans-serif")
        .attr("font-size", "18px")
        .attr("fill", "black")
        .text("House");

</script>
</body>
</html>
