<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D3.js Annotated SVG Explorer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 30px; 
            background-color: #f0f0f0; 
        }
        #canvas-container { 
            border: 2px solid #ccc; 
            background-color: white; 
            margin-bottom: 20px; 
        }
        .controls { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap;
            justify-content: center;
        }
        button { 
            padding: 10px 15px; 
            cursor: pointer; 
            border: 1px solid #999; 
            background: #fff; 
            border-radius: 4px; 
            font-weight: bold;
        }
        button:hover { background: #e0e0e0; }
        
        /* Annotation styles */
        .anno-text { font-family: monospace; font-size: 15px; font-weight: bold; }
        .anno-bg { stroke: white; stroke-width: 4; stroke-linejoin: round; }
        .anno-fg { fill: #000; }
        .anno-line { stroke: #000; stroke-width: 2; stroke-dasharray: 4,4; }
        .anno-dot { fill: #d32f2f; stroke: white; stroke-width: 2; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div class="controls">
    <button onclick="showAnno('rect')">Show Rectangle Coordinates</button>
    <button onclick="showAnno('circle')">Show Circle Coordinates</button>
    <button onclick="showAnno('polygon')">Show Polygon Coordinates</button>
    <button onclick="showAnno('text')">Show Text Coordinates</button>
    <button onclick="showAnno('none')">Clear Annotations</button>
</div>

<script>
    // 1. Set up the SVG container
    const width = 400, height = 400;
    const svg = d3.select("#canvas-container")
        .append("svg").attr("width", width).attr("height", height);

    // --- ORIGINAL SCENE WITH EXACT COLORS ---
    svg.append("rect").attr("width", width).attr("height", height).attr("fill", "#87CEEB"); // Sky
    svg.append("rect").attr("y", 240).attr("width", width).attr("height", 160).attr("fill", "#008000"); // Grass
    svg.append("circle").attr("cx", 320).attr("cy", 80).attr("r", 35).attr("fill", "yellow"); // Sun
    svg.append("rect").attr("x", 65).attr("y", 180).attr("width", 15).attr("height", 80).attr("fill", "#A0522D"); // Tree Trunk
    svg.append("path").attr("d", "M 72.5 200 C 30 200 30 140 55 140 C 65 140 72.5 155 72.5 155 C 72.5 155 80 140 90 140 C 115 140 115 200 72.5 200 Z").attr("fill", "forestgreen"); // Tree Leaves
    svg.append("rect").attr("x", 120).attr("y", 160).attr("width", 160).attr("height", 120).attr("fill", "#8B4513"); // House Body
    svg.append("polygon").attr("points", "120,160 200,80 280,160").attr("fill", "#CD853F"); // Roof
    svg.append("rect").attr("x", 135).attr("y", 175).attr("width", 30).attr("height", 30).attr("fill", "#ADD8E6"); // Left Window
    svg.append("rect").attr("x", 235).attr("y", 175).attr("width", 30).attr("height", 30).attr("fill", "#ADD8E6"); // Right Window
    svg.append("rect").attr("x", 185).attr("y", 220).attr("width", 30).attr("height", 60).attr("fill", "#A0522D"); // Door
    svg.append("circle").attr("cx", 210).attr("cy", 255).attr("r", 3).attr("fill", "black"); // Doorknob
    svg.append("path").attr("d", "M 185 280 Q 100 340 190 400").attr("stroke", "orange").attr("stroke-width", 3).attr("fill", "none"); // Path Left
    svg.append("path").attr("d", "M 215 280 Q 130 340 230 400").attr("stroke", "orange").attr("stroke-width", 3).attr("fill", "none"); // Path Right
    svg.append("text").attr("x", 305).attr("y", 235).attr("font-family", "Arial, sans-serif").attr("font-size", "18px").attr("fill", "black").text("House"); // Label


    // --- INTERACTIVE ANNOTATIONS ---
    const gAnno = svg.append("g").attr("id", "annotations");

    function drawLabel(g, x, y, text) {
        g.append("text").attr("x", x).attr("y", y).text(text).attr("class", "anno-text anno-bg");
        g.append("text").attr("x", x).attr("y", y).text(text).attr("class", "anno-text anno-fg");
    }

    // 1. Rectangle Annotations (House Body) - FIXED SPACING
    const gRect = gAnno.append("g").attr("id", "anno-rect").attr("class", "hidden");
    gRect.append("circle").attr("cx", 120).attr("cy", 160).attr("r", 6).attr("class", "anno-dot");
    
    // Moved x, y label to the left
    drawLabel(gRect, 10, 130, "x: 120, y: 160"); 
    
    // Moved width line and label up slightly
    gRect.append("line").attr("x1", 120).attr("y1", 145).attr("x2", 280).attr("y2", 145).attr("class", "anno-line");
    drawLabel(gRect, 160, 138, "width: 160");
    
    gRect.append("line").attr("x1", 105).attr("y1", 160).attr("x2", 105).attr("y2", 280).attr("class", "anno-line");
    drawLabel(gRect, 15, 225, "height: 120");

    // 2. Circle Annotations (Sun)
    const gCircle = gAnno.append("g").attr("id", "anno-circle").attr("class", "hidden");
    gCircle.append("circle").attr("cx", 320).attr("cy", 80).attr("r", 6).attr("class", "anno-dot");
    drawLabel(gCircle, 330, 75, "cx: 320, cy: 80");
    gCircle.append("line").attr("x1", 320).attr("y1", 80).attr("x2", 355).attr("y2", 80).attr("class", "anno-line");
    drawLabel(gCircle, 325, 100, "r: 35");

    // 3. Polygon Annotations (Roof)
    const gPoly = gAnno.append("g").attr("id", "anno-polygon").attr("class", "hidden");
    const points = [[120, 160], [200, 80], [280, 160]];
    points.forEach(p => {
        gPoly.append("circle").attr("cx", p[0]).attr("cy", p[1]).attr("r", 6).attr("class", "anno-dot");
        drawLabel(gPoly, p[0] + 12, p[1] - 8, `${p[0]}, ${p[1]}`);
    });

    // 4. Text Annotations (Label)
    const gText = gAnno.append("g").attr("id", "anno-text").attr("class", "hidden");
    gText.append("circle").attr("cx", 305).attr("cy", 235).attr("r", 6).attr("class", "anno-dot");
    drawLabel(gText, 250, 260, "x: 305, y: 235");

    // UI Toggle Logic
    window.showAnno = function(type) {
        d3.selectAll("#annotations > g").classed("hidden", true);
        if(type !== 'none') {
            d3.select("#anno-" + type).classed("hidden", false);
        }
    }
</script>
</body>
</html>
